[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/deepseek/v1/messages"
  to = "/.netlify/functions/deepseek-messages"
  status = 200

[[redirects]]
  from = "/api/demo-workspace"
  to = "/.netlify/functions/demo-workspace"
  status = 200
